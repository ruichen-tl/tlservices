<html lang="en">

    <title>TL Services Directory</title>

        /* Base Reset & Typography */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f9fafb;
            color: #1f2937;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding-top: 8vh;
            padding-bottom: 8vh;
        }

        /* Centered Container */
        .container {
            width: 100%;
            max-width: 520px; /* Slightly wider to accommodate text nicely */
            padding: 0 1.5rem;
            text-align: center;
            box-sizing: border-box;
        }

        /* Profile/Logo Avatar */
        .avatar {
            width: 96px;
            height: 96px;
            background-color: #2563eb;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem;
            font-weight: bold;
            margin: 0 auto 1.2rem auto;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* Headings */
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.025em;
        }

            font-size: 1rem;
            color: #6b7280;
            margin: 0 0 2rem 0;
        }
